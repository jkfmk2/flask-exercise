{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    {{ form.csrf_token }}
    {{ form.title.label }}
    {{ form.title() }}
    {{ form.body.label }}
    {{ form.body() }}
    {{ form.submit() }}
  </form>
  <hr>
  <form action="{{ url_for('blog.delete', id=post.id) }}" method="post">
    {{ form.csrf_token }}
    <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
